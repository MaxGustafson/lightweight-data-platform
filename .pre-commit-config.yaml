repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 4.2.2
    hooks:
      - id: sqlfluff-fix
        files: ^transformations/.*\.sql$
        additional_dependencies:
          - sqlfluff-templater-dbt==4.2.2
          - dbt-duckdb>=1.9.0
